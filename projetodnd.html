        <h2 class="titulo_secundario">Crie seu personagem:</h2>
        <form action="" method="" autocomplete="off">
            <label for="nomepessoa">Nome do Personagem:</label> <br>
            <input type="text" name="nome" id="nomepessoa" minlength="3" maxlength="15" required placeholder="Ex. Astarion" size="30">
                <br> <br>
            <label for="email">Endereço para cartas mágicas:</label> <br>
            <input type="email" name="email" id="email" required placeholder="Informe um email" size="30">
                <br> <br>
             <label for="ano">Ano de Nascimento do Personagem:</label> <br>   
            <input type="date" id="ano" name="ano" max="1490" min="1000" placeholder="Se lembre que estamos na terra média!!" size="30">
                <br> <br>
            <label for="telefone">Número de sua Concha Mágica:</label> <br>
            <input type="tel" name="telefone" id="telefone" placeholder="Informe um número de telefone" size="30">
                <br> <br>
            <label>Informe sua página no TavernKeeper:</label> <br>
            <input type="url" name="github" id="github" placeholder="Informe um link" size="30">
                <br> <br>
            <label for="senha">Informe a Palavra Chave da Guilda:</label><br>
            <input type="password" id="senha" name="senha" placeholder="Informe a palavra chave" size="30">
            <br> <br>
            <label for="cor">Informe a Cor do Último Dragão que Derrotou:</label><br>
            <input type="color" id="cor" name="cor" placeholder="Informe a Cor do Dragão" size="30">
            <br> <br>
            <label for="arquivo">Suba a Aparência de seu Personagem:</label><br>
            <input type="file" id="file" name="arquivo" placeholder="Suba um arquivo" size="30">
            <br> <br>
