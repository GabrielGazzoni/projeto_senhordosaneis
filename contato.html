        <h2 class="titulo_secundario">Entre em contato:</h2>
        <form action="" method="" autocomplete="off">
            <label for="nomepessoa">Nome:</label> <br>
            <input type="text" name="nome" id="nomepessoa" minlength="3" maxlength="15" required placeholder="Informe seu nome" size="30">
                <br> <br>
            <label for="email">Email:</label> <br>
            <input type="email" name="email" id="email" required placeholder="Informe seu endereço de email" size="30">
                <br> <br>
            <label for="ano">Ano de Nascimento:</label> <br>   
            <input type="email" id="ano" name="ano" max="2026" min="1900" placeholder="Informe seu ano de nascimento" size="30">
                <br> <br>
            <label for="telefone">Telefone</label> <br>
            <input type="tel" name="telefone" id="telefone" placeholder="Informe seu número de telefone" size="30">
                <br> <br>
            <label>Informe seu github:</label> <br>
            <input type="url" name="github" id="github" placeholder="Informe o link do seu github" size="30">
                <br> <br>
            <label for="senha">Informe sua senha:</label><br>
            <input type="password" id="senha" name="senha" placeholder="Informe sua senha" size="30">
            <br> <br>
            <label for="cor">Informe sua cor favorita:</label><br>
            <input type="color" id="cor" name="cor" placeholder="Informe sua cor favorita" size="30">
            <br> <br>
            <label for="arquivo">Suba um arquivo:</label><br>
            <input type="file" id="file" name="arquivo" placeholder="Suba um arquivo" size="30">
            <br> <br>
            <label for="data">Informe o dia de hoje:</label><br>
            <input type="date" id="data" name="data" placeholder="Informe o dia de hoje" size="30">
            <br> <br>
            <label for="datahora">Data e hora atual:</label><br>
            <input type="datetime-local" id="datahora" name="datahora" size="30">
            <br> <br>
            <label for="pesquisa">Pesquisa</label> <br>
            <input type="search" id="pesquisa" name="pesquisa" size="30">
            <br> <br>
            <label for="descricao">Informe aqui o que você gosta!</label> <br>
            <textarea cols="22" rows="8" name="descrição" id="descricao"></textarea>
            <br> <br>
            <label for="nivel">Escolha o nível</label> <br>     
            <input type="range" max="10" min="1" id="nivel" name="nivel">

            <fieldset>
                <legend>Desenvolvimento para internet</legend>
                <label><input type="checkbox" name="php" value="php">PHP</label>
                <label><input type="checkbox" name="html5" value="html5">HTML5  </label>
                <label><input type="checkbox" name="css" value="css">CSS</label>
                <label><input type="checkbox" name="js" value="js">JAVASCRIPT</label>
            </fieldset>
            <br> <br>
            <!--Datalist maneira-->
            <input type="text" id="busca_datalist" list="paises">

            <datalist id="paises">
                <option>Brasil</option>
                <option>França</option>
                <option>Alemanha</option>
                <option>Argentina</option>
                <option>Papua Nova Guiné</option>
            </datalist>
            <br> <br> <br>

            <audio controls muted autoplay loop>
                <source src="audio/musica.mp3" type="audio/mp3">
            </audio>
        <br> <br> <br>
            <video controls loop muted poster="img/bruno.png">
                <source src="video/videoteste.mp4" type="video/mp4">
            </video>
